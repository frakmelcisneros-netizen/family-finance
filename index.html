<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f0f14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FamilyFinance"/>
<title>FamilyFinance</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0c0c12;--card:#16161f;--card2:#1e1e2e;--border:#2a2a3d;--accent:#a78bfa;--accent2:#7c3aed;--green:#34d399;--red:#fb7185;--yellow:#fbbf24;--blue:#60a5fa;--text:#f0eeff;--muted:#6b6b8f;--radius:16px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;height:100%;overflow:hidden;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes toastIn{from{transform:translateY(-20px) translateX(-50%);opacity:0}to{transform:translateY(0) translateX(-50%);opacity:1}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#header{background:var(--card);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 12px) 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-family:"Syne",sans-serif;font-weight:800;font-size:18px;background:linear-gradient(90deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:10px;color:var(--muted);margin-top:1px}
.logout-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer}
#content{flex:1;overflow:hidden;position:relative}
.tab-pane{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:14px 14px 24px;animation:slideUp .28s ease}
#nav{background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 4px calc(var(--safe-bot) + 6px);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border:none;background:transparent;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:10px;font-weight:600;color:var(--muted);border-radius:12px;transition:all .18s}
.nav-btn .nav-icon{font-size:22px;line-height:1}
.nav-btn.active{color:var(--accent);background:rgba(167,139,250,.1)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-hero{padding:18px;background:linear-gradient(135deg,#1a1535 0%,#12122a 100%);border-color:rgba(167,139,250,.25)}
.label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:3px}
.big-num{font-family:"Syne",sans-serif;font-weight:800;font-size:30px;line-height:1}
.section-title{font-family:"Syne",sans-serif;font-weight:700;font-size:15px;margin:14px 0 8px;display:flex;align-items:center;justify-content:space-between}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-purple{background:rgba(167,139,250,.15);color:var(--accent)}
.progress-wrap{background:var(--card2);border-radius:6px;height:8px;overflow:hidden}
.progress-fill{height:8px;border-radius:6px;transition:width .6s;background:linear-gradient(90deg,var(--green),var(--accent))}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:14px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s,opacity .12s;text-align:center}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--accent2);color:#fff}
.btn-green{background:rgba(52,211,153,.2);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.btn-red{background:rgba(251,113,133,.2);color:var(--red);border:1px solid rgba(251,113,133,.3)}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;display:inline-block;border-radius:10px}
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif;transition:all .15s;background:var(--card2);color:var(--muted)}
.chip.active{background:var(--accent2);color:#fff}
.tx-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.tx-row:last-child{border-bottom:none}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-desc{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tx-amt{font-family:"Syne",sans-serif;font-weight:700;font-size:16px;white-space:nowrap;flex-shrink:0}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px;display:block}
.form-input{width:100%;padding:12px 14px;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:15px;outline:none;transition:border-color .15s;appearance:none}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
select.form-input option{background:var(--card2)}
.type-toggle{display:flex;gap:6px;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border-radius:12px;border:none;font-family:"DM Sans",sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;background:var(--card2);color:var(--muted)}
.type-btn.active-gasto{background:rgba(251,113,133,.2);color:var(--red)}
.type-btn.active-ingreso{background:rgba(52,211,153,.2);color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:20px 20px calc(var(--safe-bot) + 28px);max-height:90dvh;overflow-y:auto;border-top:1px solid var(--border);animation:slideUp .25s ease}
.modal-title{font-family:"Syne",sans-serif;font-weight:800;font-size:18px;margin-bottom:16px}
.drag-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.pin-inputs{display:flex;gap:12px;margin:24px 0 10px}
.pin-box{width:60px;height:72px;border-radius:16px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:30px;font-weight:800;text-align:center;font-family:"Syne",sans-serif;outline:none;transition:border-color .15s;caret-color:transparent}
.pin-box:focus{border-color:var(--accent)}
.pin-error .pin-box{border-color:var(--red);animation:shake .4s ease}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a2a1a;font-weight:700;font-size:14px;padding:10px 22px;border-radius:24px;z-index:999;white-space:nowrap;animation:toastIn .3s ease;pointer-events:none;font-family:"DM Sans",sans-serif}
#toast.err{background:var(--red);color:#2a0a0a}
.acc-card{display:flex;align-items:center;gap:12px}
.acc-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.acc-body{flex:1}
.acc-name{font-weight:700;font-size:14px}
.acc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.debt-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.debt-info{font-size:11px;color:var(--muted);margin-bottom:6px}
.debt-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.snow-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.snow-item:last-child{border-bottom:none}
.snow-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.vac-hero{text-align:center;padding:24px 16px}
.vac-pct{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;color:var(--accent);margin-top:10px}
.icon-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.icon-opt{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);background:var(--card2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.icon-opt.selected{border-color:var(--accent);background:rgba(167,139,250,.15)}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.cal-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.cal-row:last-child{border-bottom:none}
.cal-day{width:34px;height:34px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:800;font-size:14px;color:var(--accent);flex-shrink:0}
.sep{height:1px;background:var(--border);margin:12px 0}

/* === NEW: Filter section styles === */
.filter-section{margin-bottom:12px}
.filter-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.chip-acc{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif;transition:all .15s;background:var(--card2);color:var(--muted);display:inline-flex;align-items:center;gap:4px}
.chip-acc.active{background:rgba(96,165,250,.2);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.chip-acc:not(.active){border:1px solid transparent}
.acc-breakdown{display:flex;flex-direction:column;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.acc-break-row{display:flex;align-items:center;gap:8px;font-size:12px}
.acc-break-icon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(167,139,250,.1)}
.acc-break-name{flex:1;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-break-vals{display:flex;gap:12px;font-weight:700;font-size:11px;flex-shrink:0}
</style>
</head>
<body>
<div id="pin-screen">
  <div style="font-size:52px;margin-bottom:8px">&#x1F49C;</div>
  <div style="font-family:Syne,sans-serif;font-weight:800;font-size:26px;background:linear-gradient(90deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent">FamilyFinance</div>
  <div style="font-size:13px;color:var(--muted);margin-top:4px;margin-bottom:32px">Joli &amp; Coffee &#x1F43E; &middot; Tu familia, tus finanzas</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Ingresa tu PIN de 4 digitos</div>
  <div class="pin-inputs" id="pinInputs">
    <input class="pin-box" maxlength="1" type="password" inputmode="numeric" id="p0"/>
    <input class="pin-box" maxlength="1" type="password" inputmode="numeric" id="p1"/>
    <input class="pin-box" maxlength="1" type="password" inputmode="numeric" id="p2"/>
    <input class="pin-box" maxlength="1" type="password" inputmode="numeric" id="p3"/>
  </div>
  <div id="pinError" style="font-size:13px;color:var(--red);min-height:20px;font-weight:600"></div>
  <div id="fbStatus" style="font-size:11px;color:var(--muted);margin-top:24px">&#x23F3; Conectando...</div>
  <div style="font-size:11px;color:var(--muted);margin-top:8px">PIN por defecto: 1234</div>
</div>
<div id="app" style="display:none">
  <div id="header">
    <div>
      <div class="header-title">FamilyFinance</div>
      <div class="header-sub" id="headerSub">2026 &middot; Joli &amp; Coffee</div>
    </div>
    <button class="logout-btn" onclick="logout()">&#x1F512; Salir</button>
  </div>
  <div id="content">
    <div id="pane-dashboard" class="tab-pane"></div>
    <div id="pane-movements" class="tab-pane" style="display:none"></div>
    <div id="pane-debts" class="tab-pane" style="display:none"></div>
    <div id="pane-fixed" class="tab-pane" style="display:none"></div>
    <div id="pane-vacation" class="tab-pane" style="display:none"></div>
  </div>
  <nav id="nav">
    <button class="nav-btn active" onclick="showTab('dashboard')" id="nav-dashboard"><span class="nav-icon">&#x1F4CA;</span>Inicio</button>
    <button class="nav-btn" onclick="showTab('movements')" id="nav-movements"><span class="nav-icon">&#x1F4B8;</span>Gastos</button>
    <button class="nav-btn" onclick="showTab('debts')" id="nav-debts"><span class="nav-icon">&#x1F4C9;</span>Deudas</button>
    <button class="nav-btn" onclick="showTab('fixed')" id="nav-fixed"><span class="nav-icon">&#x1F4CC;</span>Fijos</button>
    <button class="nav-btn" onclick="showTab('vacation')" id="nav-vacation"><span class="nav-icon">&#x2708;&#xFE0F;</span>Viaje</button>
  </nav>
</div>
<div id="modalContainer"></div>
<div id="toast" style="display:none"></div>
<script>

// ============================================================
// CONFIGURACION FIREBASE - EDITA ESTOS 7 VALORES
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyABNthwO3tXLUcYgXXXLJXlHbb_aRCR0DI",
  authDomain: "finanzas-familiar-b41aa.firebaseapp.com",
  databaseURL: "https://finanzas-familiar-b41aa-default-rtdb.firebaseio.com",
  projectId: "finanzas-familiar-b41aa",
  storageBucket: "finanzas-familiar-b41aa.firebasestorage.app",
  messagingSenderId: "239691748871",
  appId: "1:239691748871:web:a67f2d95762dfef24b7ca2"
};
const APP_PIN = "0402";
// ============================================================

let fbDB = null;
let DATA = {};
let _writing = false;

const CAT_ICONS = {
  "Ingresos":"💚","Arriendo":"🏠","Gastos Comunes":"🔧","Alimentacion":"🛒",
  "Transporte":"🚗","Salud":"🏥","Educacion":"📚","Mascotas":"🐾",
  "Entretenimiento":"🎬","Servicios":"📡","Familia":"👨‍👩‍👧","Deudas":"💸","Otro":"📦"
};
const CATEGORIES = Object.keys(CAT_ICONS);
const DEFAULT_DATA = {
  accounts:{}, transactions:{}, debts:{}, fixed_expenses:{},
  vacation:{name:"",destination:"",date:"",budget:0,saved:0,items:{}}
};

// ---- FIREBASE ----
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDB = firebase.database();
    document.getElementById("fbStatus").textContent = "🔥 Firebase conectado";
    document.getElementById("fbStatus").style.color = "var(--green)";
    fbDB.ref("/familyfinance").on("value", function(snap) {
      if (_writing) return;
      var val = snap.val();
      if (val) { DATA = val; }
      else { DATA = JSON.parse(JSON.stringify(DEFAULT_DATA)); fbDB.ref("/familyfinance").set(DATA); }
      renderCurrentTab();
    });
  } catch(e) {
    console.warn("Firebase no disponible:", e);
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    document.getElementById("fbStatus").textContent = "💾 Modo offline";
    document.getElementById("fbStatus").style.color = "var(--yellow)";
    renderCurrentTab();
  }
}

function setDeep(obj, keys, val) {
  var cur = obj;
  for (var i=0; i<keys.length-1; i++) { cur[keys[i]] = cur[keys[i]] || {}; cur = cur[keys[i]]; }
  cur[keys[keys.length-1]] = val;
}
function fbSetObject(path, obj) {
  setDeep(DATA, path.split("/"), obj);
  if (!fbDB) return;
  _writing = true;
  fbDB.ref("/familyfinance/" + path).set(obj)
    .then(function() { setTimeout(function(){ _writing=false; }, 600); })
    .catch(function(err) { _writing=false; showWriteError(err.message); });
}
function fbSet(path, val) {
  setDeep(DATA, path.split("/"), val);
  if (!fbDB) return;
  _writing = true;
  fbDB.ref("/familyfinance/" + path).set(val)
    .then(function() { setTimeout(function(){ _writing=false; }, 600); })
    .catch(function(err) { _writing=false; showWriteError(err.message); });
}
function fbPush(path, val) {
  var key = "id_" + Date.now();
  fbSetObject(path + "/" + key, val);
  return key;
}
function fbDel(path) {
  var keys = path.split("/");
  var obj = DATA;
  for (var i=0; i<keys.length-1; i++) { if (!obj[keys[i]]) return; obj = obj[keys[i]]; }
  delete obj[keys[keys.length-1]];
  if (!fbDB) return;
  _writing = true;
  fbDB.ref("/familyfinance/" + path).remove()
    .then(function() { setTimeout(function(){ _writing=false; }, 600); })
    .catch(function(err) { _writing=false; showWriteError(err.message); });
}
function showWriteError(msg) {
  var t = document.getElementById("toast");
  t.textContent = "Error guardando: " + msg;
  t.className = "err";
  t.style.display = "block";
  setTimeout(function(){ t.style.display="none"; }, 5000);
}

// ---- HELPERS ----
function fmtCLP(n) {
  n = parseFloat(n)||0;
  var abs = Math.abs(Math.round(n)).toLocaleString("es-CL");
  return (n<0?"-":"") + "$" + abs;
}
function nowStr() {
  return new Date().toLocaleString("es-CL",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}).replace(/(\d+)\/(\d+)\/(\d+),\s*/,"$3-$2-$1 ");
}
function dateFmt(s) {
  if (!s) return "";
  try { var d=new Date(s.replace(" ","T")); return d.toLocaleString("es-CL",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
  catch(e) { return s.slice(0,16); }
}

// ---- PIN ----
var pinBoxes = [0,1,2,3].map(function(i){ return document.getElementById("p"+i); });
pinBoxes.forEach(function(box,i) {
  box.addEventListener("input", function() {
    box.value = box.value.replace(/\D/g,"").slice(-1);
    if (box.value && i<3) pinBoxes[i+1].focus();
    var full = pinBoxes.map(function(b){ return b.value; }).join("");
    if (full.length===4) checkPin(full);
  });
  box.addEventListener("keydown", function(e) {
    if (e.key==="Backspace" && !box.value && i>0) pinBoxes[i-1].focus();
  });
});
pinBoxes[0].focus();

function checkPin(pin) {
  if (pin === APP_PIN) {
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    initFirebase();
  } else {
    document.getElementById("pinError").textContent = "PIN incorrecto";
    document.getElementById("pinInputs").classList.add("pin-error");
    pinBoxes.forEach(function(b){ b.value=""; });
    setTimeout(function(){
      document.getElementById("pinInputs").classList.remove("pin-error");
      document.getElementById("pinError").textContent="";
      pinBoxes[0].focus();
    }, 800);
  }
}
function logout() {
  document.getElementById("app").style.display = "none";
  document.getElementById("pin-screen").style.display = "flex";
  pinBoxes.forEach(function(b){ b.value=""; });
  document.getElementById("fbStatus").textContent="Conectando...";
  document.getElementById("fbStatus").style.color="var(--muted)";
  pinBoxes[0].focus();
}

// ---- TABS ----
var currentTab = "dashboard";
function showTab(tab) {
  document.querySelectorAll(".tab-pane").forEach(function(p){ p.style.display="none"; });
  document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
  document.getElementById("pane-"+tab).style.display = "block";
  document.getElementById("nav-"+tab).classList.add("active");
  currentTab = tab;
  renderTab(tab);
}
function renderCurrentTab(){ renderTab(currentTab); }
function renderTab(tab) {
  var renders = {dashboard:renderDashboard,movements:renderMovements,debts:renderDebts,fixed:renderFixed,vacation:renderVacation};
  if (renders[tab]) renders[tab]();
}

// ---- TOAST ----
var toastTimer;
function toast(msg, err) {
  var t = document.getElementById("toast");
  t.textContent = (err?"Aviso: ":"Ok: ") + msg;
  t.className = err?"err":"";
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.style.display="none"; }, 2800);
}

// ---- MODAL ----
function openModal(html) {
  closeModal();
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "activeModal";
  overlay.innerHTML = '<div class="modal-sheet"><div class="drag-handle"></div>' + html + '</div>';
  overlay.addEventListener("click", function(e){ if(e.target===overlay) closeModal(); });
  document.getElementById("modalContainer").appendChild(overlay);
}
function closeModal() {
  var m = document.getElementById("activeModal");
  if (m) m.remove();
}

// ---- ICON PICKERS (global helpers) ----
function selectIconInPicker(pickerId, hiddenId, ico) {
  document.querySelectorAll("#"+pickerId+" .icon-opt").forEach(function(e){ e.classList.remove("selected"); });
  document.querySelector("#"+pickerId+" [data-ico='"+ico+"']").classList.add("selected");
  document.getElementById(hiddenId).value = ico;
}
function buildIconPicker(pickerId, hiddenId, icons, selected) {
  return '<div class="icon-picker" id="'+pickerId+'">' +
    icons.map(function(ico){
      return '<div class="icon-opt'+(ico===selected?' selected':'')+'" data-ico="'+ico+'" onclick="selectIconInPicker(\''+pickerId+'\',\''+hiddenId+'\',\''+ico+'\')">'+ico+'</div>';
    }).join('') +
  '</div><input type="hidden" id="'+hiddenId+'" value="'+selected+'"/>';
}

// ============================================================
// DASHBOARD - UPDATED: shows breakdown per account
// ============================================================
function renderDashboard() {
  var accs=DATA.accounts||{}, txs=DATA.transactions||{}, debts=DATA.debts||{};
  var monthStr=new Date().toISOString().slice(0,7);
  var totalAssets=Object.values(accs).reduce(function(s,a){ return s+(parseFloat(a.balance||0)>0?parseFloat(a.balance):0); },0);
  var totalDebt=Object.values(debts).reduce(function(s,d){ return s+(parseFloat(d.total||0)-parseFloat(d.paid||0)); },0);
  var netWorth=totalAssets-totalDebt;

  // === ALL transactions this month across ALL accounts ===
  var monthTxs=Object.values(txs).filter(function(t){ return (t.date||"").startsWith(monthStr); });
  var income=monthTxs.filter(function(t){ return t.txtype==="ingreso"; }).reduce(function(s,t){ return s+parseFloat(t.amount||0); },0);
  var expense=Math.abs(monthTxs.filter(function(t){ return t.txtype==="gasto"; }).reduce(function(s,t){ return s+parseFloat(t.amount||0); },0));
  var balance=income-expense;

  // === Per-account breakdown for this month ===
  var accBreakdown={};
  Object.keys(accs).forEach(function(accId){
    accBreakdown[accId]={income:0,expense:0};
  });
  monthTxs.forEach(function(t){
    var aid=t.account;
    if (!accBreakdown[aid]) accBreakdown[aid]={income:0,expense:0};
    if (t.txtype==="ingreso") accBreakdown[aid].income+=parseFloat(t.amount||0);
    else if (t.txtype==="gasto") accBreakdown[aid].expense+=Math.abs(parseFloat(t.amount||0));
  });

  var byCat={};
  monthTxs.filter(function(t){ return t.txtype==="gasto"; }).forEach(function(t){ byCat[t.cat]=(byCat[t.cat]||0)+Math.abs(parseFloat(t.amount||0)); });
  var topCats=Object.entries(byCat).sort(function(a,b){ return b[1]-a[1]; }).slice(0,4);
  var maxCat=topCats[0]?topCats[0][1]:1;
  var lastTxs=Object.entries(txs).sort(function(a,b){ return (b[1].date||"")>(a[1].date||"")?1:-1; }).slice(0,5);

  var html='<div class="card card-hero">';
  html+='<div class="label">PATRIMONIO NETO</div>';
  html+='<div class="big-num" style="color:'+(netWorth>=0?"var(--green)":"var(--red)")+'">'+fmtCLP(netWorth)+'</div>';
  html+='<div style="display:flex;gap:20px;margin-top:10px">';
  html+='<div><div style="color:var(--green);font-weight:700;font-size:15px">'+fmtCLP(totalAssets)+'</div><div style="font-size:11px;color:var(--muted)">Activos</div></div>';
  html+='<div><div style="color:var(--red);font-weight:700;font-size:15px">'+fmtCLP(totalDebt)+'</div><div style="font-size:11px;color:var(--muted)">Deudas</div></div>';
  html+='</div></div>';

  html+='<div class="grid-2" style="margin-bottom:8px">';
  [["Ingresos",income,"var(--green)"],["Gastos",expense,"var(--red)"]].forEach(function(row){
    html+='<div class="card" style="padding:13px;margin:0">';
    html+='<div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">'+row[0]+' (todas las cuentas)</div>';
    html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:18px;color:'+row[2]+'">'+fmtCLP(Math.abs(row[1]))+'</div>';
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="card" style="padding:13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">';
  html+='<div><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px">Balance del mes (global)</div>';
  html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:22px;color:'+(balance>=0?"var(--green)":"var(--red)")+'">'+fmtCLP(balance)+'</div></div>';
  html+='<div style="font-size:32px">'+(balance>=0?"✅":"⚠️")+'</div></div>';

  // === NEW: Per-account breakdown card ===
  var accIds=Object.keys(accs);
  if (accIds.length>1) {
    html+='<div class="card" style="padding:14px">';
    html+='<div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Desglose por cuenta este mes</div>';
    accIds.forEach(function(accId){
      var a=accs[accId];
      var bd=accBreakdown[accId]||{income:0,expense:0};
      var accBal=bd.income-bd.expense;
      html+='<div class="acc-break-row" style="padding:6px 0;border-bottom:1px solid var(--border)">';
      html+='<div class="acc-break-icon">'+(a.icon||"🏦")+'</div>';
      html+='<div class="acc-break-name">'+a.name+'</div>';
      html+='<div class="acc-break-vals">';
      html+='<span style="color:var(--green)">+'+fmtCLP(bd.income)+'</span>';
      html+='<span style="color:var(--red)">-'+fmtCLP(bd.expense)+'</span>';
      html+='</div></div>';
    });
    html+='</div>';
  }

  html+='<div class="section-title">Cuentas <button class="btn btn-primary btn-sm" onclick="openAddAccount()">+ Cuenta</button></div>';
  Object.entries(accs).forEach(function(entry){
    var id=entry[0], a=entry[1];
    html+='<div class="card"><div class="acc-card">';
    html+='<div class="acc-icon" style="background:rgba(167,139,250,.15)">'+(a.icon||"🏦")+'</div>';
    html+='<div class="acc-body"><div class="acc-name">'+a.name+'</div>';
    html+='<div class="acc-sub">'+(a.owner||"Ambos")+' · '+a.type+(a.type==="credito"?" · Lim: "+fmtCLP(a.limit):"")+'</div></div>';
    html+='<div style="text-align:right">';
    html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:17px;color:'+(parseFloat(a.balance||0)>=0?"var(--green)":"var(--red)")+'">'+fmtCLP(a.balance)+'</div>';
    html+='<button onclick="openEditAccount(\''+id+'\')" style="background:rgba(167,139,250,.15);border:none;color:var(--accent);border-radius:8px;padding:2px 8px;font-size:11px;cursor:pointer;margin-top:3px">Editar</button>';
    html+='</div></div></div>';
  });

  html+='<div class="grid-2" style="margin-top:6px">';
  html+='<button class="btn btn-red" onclick="openAddTx(\'gasto\')">+ Gasto</button>';
  html+='<button class="btn btn-green" onclick="openAddTx(\'ingreso\')">+ Ingreso</button>';
  html+='</div>';

  if (topCats.length) {
    html+='<div class="section-title">Top gastos del mes</div><div class="card">';
    topCats.forEach(function(e){
      html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">';
      html+='<span>'+(CAT_ICONS[e[0]]||"📦")+' '+e[0]+'</span><span style="font-weight:700">'+fmtCLP(e[1])+'</span></div>';
      html+='<div class="progress-wrap"><div class="progress-fill" style="width:'+(e[1]/maxCat*100).toFixed(0)+'%"></div></div></div>';
    });
    html+='</div>';
  }

  html+='<div class="section-title">Ultimos movimientos</div><div class="card">';
  if (!lastTxs.length) html+='<div style="text-align:center;padding:20px;color:var(--muted)">Sin movimientos aun</div>';
  lastTxs.forEach(function(entry){
    var id=entry[0], tx=entry[1];
    var amt=parseFloat(tx.amount||0);
    html+='<div class="tx-row" onclick="openTxDetail(\''+id+'\')"><div class="tx-icon" style="background:'+(amt>0?"rgba(52,211,153,.12)":"rgba(251,113,133,.12)")+'">'+( CAT_ICONS[tx.cat]||"📦")+'</div>';
    html+='<div class="tx-body"><div class="tx-desc">'+tx.desc+'</div><div class="tx-meta">'+dateFmt(tx.date)+' · '+tx.cat+'</div></div>';
    html+='<div class="tx-amt" style="color:'+(amt>0?"var(--green)":"var(--red)")+'">'+(amt>0?"+":"")+fmtCLP(amt)+'</div></div>';
  });
  html+='</div><div style="height:8px"></div>';
  document.getElementById("pane-dashboard").innerHTML = html;
}

// ============================================================
// MOVEMENTS - UPDATED: filter by account + category + type
// ============================================================
var mvFilter="todos", mvSearch="", mvAccFilter="todas";
function renderMovements() {
  var txs=DATA.transactions||{}, accs=DATA.accounts||{};
  var list=Object.entries(txs);

  // === Filter by account ===
  if (mvAccFilter!=="todas") {
    list=list.filter(function(e){ return e[1].account===mvAccFilter; });
  }

  // === Filter by type/category ===
  if (mvFilter!=="todos") {
    if (["ingreso","gasto"].includes(mvFilter)) list=list.filter(function(e){ return e[1].txtype===mvFilter; });
    else list=list.filter(function(e){ return e[1].cat===mvFilter; });
  }

  // === Search ===
  if (mvSearch) list=list.filter(function(e){ return (e[1].desc||"").toLowerCase().includes(mvSearch)||(e[1].cat||"").toLowerCase().includes(mvSearch); });
  list.sort(function(a,b){ return (b[1].date||"")>(a[1].date||"")?1:-1; });

  // === Calculate filtered totals ===
  var filtIncome=list.filter(function(e){ return e[1].txtype==="ingreso"; }).reduce(function(s,e){ return s+parseFloat(e[1].amount||0); },0);
  var filtExpense=Math.abs(list.filter(function(e){ return e[1].txtype==="gasto"; }).reduce(function(s,e){ return s+parseFloat(e[1].amount||0); },0));

  var html='<div class="search-wrap"><span class="search-icon">🔍</span>';
  html+='<input class="form-input" id="mvSrch" placeholder="Buscar..." value="'+mvSearch+'" oninput="mvSearch=this.value.toLowerCase();renderMovements()" style="padding-left:36px"/></div>';

  // === NEW: Account filter chips ===
  html+='<div class="filter-section">';
  html+='<div class="filter-label">Filtrar por cuenta</div>';
  html+='<div class="chip-row">';
  html+='<button class="chip-acc'+(mvAccFilter==="todas"?" active":"")+'" onclick="mvAccFilter=\'todas\';renderMovements()">🏦 Todas</button>';
  Object.entries(accs).forEach(function(entry){
    var id=entry[0], a=entry[1];
    html+='<button class="chip-acc'+(mvAccFilter===id?" active":"")+'" onclick="mvAccFilter=\''+id+'\';renderMovements()">'+(a.icon||"🏦")+' '+a.name+'</button>';
  });
  html+='</div></div>';

  // === Type / Category chips ===
  html+='<div class="filter-section">';
  html+='<div class="filter-label">Tipo / Categoria</div>';
  html+='<div class="chip-row">';
  var filterOpts=[["todos","Todos"],["ingreso","Ingresos"],["gasto","Gastos"]];
  // Add dynamic category chips from used categories
  var usedCats={};
  Object.values(txs).forEach(function(t){ if(t.cat) usedCats[t.cat]=true; });
  Object.keys(usedCats).sort().forEach(function(cat){
    filterOpts.push([cat,cat]);
  });
  filterOpts.forEach(function(c){
    html+='<button class="chip'+(mvFilter===c[0]?" active":"")+'" onclick="mvFilter=\''+c[0]+'\';renderMovements()">'+c[1]+'</button>';
  });
  html+='</div></div>';

  // === Filtered summary cards ===
  html+='<div class="grid-2" style="margin-bottom:6px">';
  html+='<div class="card" style="padding:10px;margin:0"><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px">Ingresos filtrados</div>';
  html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:16px;color:var(--green)">'+fmtCLP(filtIncome)+'</div></div>';
  html+='<div class="card" style="padding:10px;margin:0"><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px">Gastos filtrados</div>';
  html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:16px;color:var(--red)">'+fmtCLP(filtExpense)+'</div></div>';
  html+='</div>';

  html+='<div style="font-size:11px;color:var(--muted);margin-bottom:8px">'+list.length+' movimientos'+(mvAccFilter!=="todas"?' en '+(accs[mvAccFilter]||{}).name:'')+'</div>';
  html+='<div class="card">';
  if (!list.length) html+='<div style="text-align:center;padding:20px;color:var(--muted)">Sin movimientos con estos filtros</div>';
  list.forEach(function(entry){
    var id=entry[0], tx=entry[1];
    var amt=parseFloat(tx.amount||0);
    var acc=accs[tx.account]||{};
    html+='<div class="tx-row" onclick="openTxDetail(\''+id+'\')"><div class="tx-icon" style="background:'+(amt>0?"rgba(52,211,153,.12)":"rgba(251,113,133,.12)")+'">'+( CAT_ICONS[tx.cat]||"📦")+'</div>';
    html+='<div class="tx-body"><div class="tx-desc">'+tx.desc+'</div><div class="tx-meta">'+dateFmt(tx.date)+' · '+(acc.icon||"")+" "+(acc.name||"?")+' · '+tx.cat+'</div></div>';
    html+='<div class="tx-amt" style="color:'+(amt>0?"var(--green)":"var(--red)")+'">'+(amt>0?"+":"")+fmtCLP(amt)+'</div></div>';
  });
  html+='</div><div style="height:8px"></div>';
  document.getElementById("pane-movements").innerHTML = html;
}

  var monthly=Object.values(debts).reduce(function(s,d){ return s+parseFloat(d.monthly||0); },0);

function saveTx() {
  var desc=document.getElementById("tx_desc").value.trim();
  var amt=parseFloat(document.getElementById("tx_amt").value)||0;
  var cat=document.getElementById("tx_cat").value;
  var acc=document.getElementById("tx_acc").value;
  var ttype=document.getElementById("txType").value;
  if (!desc||!amt) { toast("Completa descripcion y monto",true); return; }
  var finalAmt=ttype==="gasto"?-Math.abs(amt):Math.abs(amt);
  var key="id_"+Date.now();
  var accData=(DATA.accounts||{})[acc]||{};
  var newBal=parseFloat(accData.balance||0)+finalAmt;
  var newTx={date:nowStr(),desc:desc,amount:finalAmt,cat:cat,account:acc,txtype:ttype};
  if (fbDB) {
    _writing=true;
    var updates={};
    updates["transactions/"+key]=newTx;
    updates["accounts/"+acc+"/balance"]=newBal;
    fbDB.ref("/familyfinance").update(updates)
      .then(function(){ setDeep(DATA,["transactions",key],newTx); setDeep(DATA,["accounts",acc,"balance"],newBal); setTimeout(function(){ _writing=false; },600); })
      .catch(function(err){ _writing=false; showWriteError(err.message); });
  } else {
    setDeep(DATA,["transactions",key],newTx);
    setDeep(DATA,["accounts",acc,"balance"],newBal);
  }
  closeModal();
  toast(ttype==="gasto"?"Gasto registrado":"Ingreso registrado");
}

}

function openEditVacation() {
  var vp=DATA.vacation||{};
  openModal('<div class="modal-title">Plan de Vacaciones</div>'+
    '<div class="form-group"><label class="form-label">Nombre del viaje</label><input class="form-input" id="vp_name" placeholder="Ej: Vacaciones Vina del Mar" value="'+(vp.name||"")+'"/></div>'+
    '<div class="form-group"><label class="form-label">Destino</label><input class="form-input" id="vp_dest" placeholder="Ej: Vina del Mar" value="'+(vp.destination||"")+'"/></div>'+
    '<div class="form-group"><label class="form-label">Fecha planificada</label><input class="form-input" id="vp_date" type="date" value="'+(vp.date||"")+'"/></div>'+
    '<div class="form-group"><label class="form-label">Presupuesto total ($)</label><input class="form-input" id="vp_budget" type="number" value="'+parseFloat(vp.budget||0)+'" inputmode="numeric"/></div>'+
    '<div class="form-group"><label class="form-label">Ya ahorrado ($)</label><input class="form-input" id="vp_saved" type="number" value="'+parseFloat(vp.saved||0)+'" inputmode="numeric"/></div>'+
    '<button class="btn btn-primary" onclick="saveVacation()">Guardar Plan</button>');
}
function saveVacation() {
  var vp=DATA.vacation||{};
  fbSetObject("vacation",Object.assign({},vp,{
    name:document.getElementById("vp_name").value.trim(),
    destination:document.getElementById("vp_dest").value.trim(),
    date:document.getElementById("vp_date").value,
    budget:parseFloat(document.getElementById("vp_budget").value)||0,
    saved:parseFloat(document.getElementById("vp_saved").value)||0}));
  closeModal(); toast("Plan guardado");
}

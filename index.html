<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f0f14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FamilyFinance"/>
<title>💜 FamilyFinance</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg:      #0c0c12;
  --card:    #16161f;
  --card2:   #1e1e2e;
  --border:  #2a2a3d;
  --accent:  #a78bfa;
  --accent2: #7c3aed;
  --green:   #34d399;
  --red:     #fb7185;
  --yellow:  #fbbf24;
  --blue:    #60a5fa;
  --text:    #f0eeff;
  --muted:   #6b6b8f;
  --radius:  16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── ANIMATIONS ── */
@keyframes slideUp   { from { transform:translateY(24px); opacity:0 } to { transform:translateY(0); opacity:1 } }
@keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }
@keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.35} }
@keyframes popIn     { 0%{transform:scale(.85);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
@keyframes shake     { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
@keyframes toastIn   { from{transform:translateY(-20px) translateX(-50%);opacity:0} to{transform:translateY(0) translateX(-50%);opacity:1} }

/* ── LAYOUT ── */
#app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* ── HEADER ── */
#header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 18px 12px;
  display: flex; align-items:center; justify-content:space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
}
.header-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; background:linear-gradient(90deg,var(--accent),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-sub   { font-size:10px; color:var(--muted); margin-top:1px; }
.logout-btn   { background:var(--card2); border:1px solid var(--border); color:var(--muted); border-radius:10px; padding:6px 12px; font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; }

/* ── CONTENT ── */
#content { flex:1; overflow:hidden; position:relative; }
.tab-pane { position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding:14px 14px 24px; animation:slideUp .28s ease; }

/* ── BOTTOM NAV ── */
#nav {
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 6px 4px calc(var(--safe-bot) + 6px);
  flex-shrink: 0;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:6px 2px; border:none; background:transparent; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; color:var(--muted);
  border-radius:12px; transition:all .18s;
}
.nav-btn .nav-icon { font-size:22px; line-height:1; }
.nav-btn.active { color:var(--accent); background:rgba(167,139,250,.1); }

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.card-hero {
  padding: 18px;
  background: linear-gradient(135deg, #1a1535 0%, #12122a 100%);
  border-color: rgba(167,139,250,.25);
}

/* ── TYPOGRAPHY ── */
.label    { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:3px; }
.big-num  { font-family:'Syne',sans-serif; font-weight:800; font-size:30px; line-height:1; }
.section-title { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; margin:14px 0 8px; display:flex; align-items:center; justify-content:space-between; }

/* ── PILLS / BADGES ── */
.pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.pill-purple { background:rgba(167,139,250,.15); color:var(--accent); }
.pill-green  { background:rgba(52,211,153,.15);  color:var(--green); }
.pill-red    { background:rgba(251,113,133,.15);  color:var(--red); }

/* ── PROGRESS BAR ── */
.progress-wrap { background:var(--card2); border-radius:6px; height:8px; overflow:hidden; }
.progress-fill { height:8px; border-radius:6px; transition:width .6s cubic-bezier(.4,0,.2,1); background:linear-gradient(90deg,var(--green),var(--accent)); }

/* ── GRID ── */
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:10px; }

/* ── BUTTONS ── */
.btn { display:block; width:100%; padding:13px; border:none; border-radius:14px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:transform .12s, opacity .12s; text-align:center; }
.btn:active { transform:scale(.97); opacity:.9; }
.btn-primary  { background:var(--accent2); color:#fff; }
.btn-green    { background:rgba(52,211,153,.2); color:var(--green); border:1px solid rgba(52,211,153,.3); }
.btn-red      { background:rgba(251,113,133,.2); color:var(--red); border:1px solid rgba(251,113,133,.3); }
.btn-ghost    { background:var(--card2); color:var(--text); border:1px solid var(--border); }
.btn-sm       { padding:7px 14px; font-size:13px; width:auto; display:inline-block; border-radius:10px; }

/* ── CHIP FILTER ── */
.chip-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:10px; scrollbar-width:none; }
.chip-row::-webkit-scrollbar { display:none; }
.chip { padding:5px 13px; border-radius:20px; font-size:12px; font-weight:600; border:none; cursor:pointer; white-space:nowrap; font-family:'DM Sans',sans-serif; transition:all .15s; background:var(--card2); color:var(--muted); }
.chip.active { background:var(--accent2); color:#fff; }

/* ── TRANSACTION ROW ── */
.tx-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; }
.tx-row:last-child { border-bottom:none; }
.tx-row:active { background:rgba(255,255,255,.03); border-radius:10px; }
.tx-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.tx-body { flex:1; min-width:0; }
.tx-desc { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.tx-amt  { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; white-space:nowrap; flex-shrink:0; }

/* ── FORM ── */
.form-group { margin-bottom:12px; }
.form-label { font-size:12px; color:var(--muted); font-weight:600; margin-bottom:5px; display:block; }
.form-input {
  width:100%; padding:12px 14px; background:var(--card2); border:1.5px solid var(--border);
  border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px;
  outline:none; transition:border-color .15s; appearance:none;
}
.form-input:focus { border-color:var(--accent); }
select.form-input { cursor:pointer; }
select.form-input option { background:var(--card2); }

/* ── TYPE TOGGLE ── */
.type-toggle { display:flex; gap:6px; margin-bottom:14px; }
.type-btn { flex:1; padding:10px; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .15s; background:var(--card2); color:var(--muted); }
.type-btn.active-gasto   { background:rgba(251,113,133,.2); color:var(--red); }
.type-btn.active-ingreso { background:rgba(52,211,153,.2); color:var(--green); }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn .2s ease; }
.modal-sheet {
  background:var(--card); border-radius:24px 24px 0 0; width:100%; max-width:520px;
  padding:20px 20px calc(var(--safe-bot) + 28px);
  max-height:90dvh; overflow-y:auto;
  border-top:1px solid var(--border);
  animation:slideUp .25s ease;
}
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 18px; }
.modal-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; margin-bottom:16px; }

/* ── DRAG HANDLE ── */
.drag-handle { width:36px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 18px; }

/* ── PIN ── */
#pin-screen { position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; }
.pin-inputs { display:flex; gap:12px; margin:24px 0 10px; }
.pin-box {
  width:60px; height:72px; border-radius:16px; border:2px solid var(--border);
  background:var(--card); color:var(--text); font-size:30px; font-weight:800;
  text-align:center; font-family:'Syne',sans-serif; outline:none;
  transition:border-color .15s; caret-color:transparent;
}
.pin-box:focus { border-color:var(--accent); }
.pin-error .pin-box { border-color:var(--red); animation:shake .4s ease; }

/* ── TOAST ── */
#toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:var(--green); color:#0a2a1a; font-weight:700; font-size:14px;
  padding:10px 22px; border-radius:24px; z-index:999; white-space:nowrap;
  animation:toastIn .3s ease; pointer-events:none;
  font-family:'DM Sans',sans-serif;
}
#toast.err { background:var(--red); color:#2a0a0a; }

/* ── ACCOUNT CARD ── */
.acc-card { display:flex; align-items:center; gap:12px; }
.acc-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.acc-body { flex:1; }
.acc-name { font-weight:700; font-size:14px; }
.acc-sub  { font-size:11px; color:var(--muted); margin-top:2px; }
.acc-bal  { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; text-align:right; }

/* ── DEBT CARD ── */
.debt-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.debt-info   { font-size:11px; color:var(--muted); margin-bottom:6px; }
.debt-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }

/* ── SNOWBALL ── */
.snow-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.snow-item:last-child { border-bottom:none; }
.snow-num { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; }

/* ── VACATION PROGRESS ── */
.vac-hero { text-align:center; padding:24px 16px; }
.vac-hero .dest { font-size:13px; color:var(--muted); margin:4px 0 16px; }
.vac-pct  { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--accent); margin-top:10px; }

/* ── ICON PICKER ── */
.icon-picker { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.icon-opt { width:40px; height:40px; border-radius:10px; border:2px solid var(--border); background:var(--card2); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s; }
.icon-opt.selected { border-color:var(--accent); background:rgba(167,139,250,.15); }

/* ── SEARCH ── */
.search-wrap { position:relative; margin-bottom:10px; }
.search-wrap input { padding-left:36px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; }

/* ── FIXED CALENDAR ── */
.cal-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); }
.cal-row:last-child { border-bottom:none; }
.cal-day { width:34px; height:34px; border-radius:10px; background:var(--card2); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:var(--accent); flex-shrink:0; }

/* SEPARATOR */
.sep { height:1px; background:var(--border); margin:12px 0; }

/* FAB */
.fab { position:fixed; right:18px; bottom:calc(var(--safe-bot) + 74px); width:52px; height:52px; border-radius:50%; background:var(--accent2); border:none; color:#fff; font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(124,58,237,.5); transition:transform .15s; z-index:50; }
.fab:active { transform:scale(.93); }
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════
// ██████╗  ██████╗ ███╗   ██╗███████╗██╗ ██████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
// ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
// ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
// ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
// ═══════════════════════════════════════════════════════

// ▼▼▼ EDITA ESTOS VALORES CON TUS DATOS DE FIREBASE ▼▼▼
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyABNthwO3tXLUcYgXXXLJXlHbb_aRCR0DI",
  authDomain: "finanzas-familiar-b41aa.firebaseapp.com",
  databaseURL: "https://finanzas-familiar-b41aa-default-rtdb.firebaseio.com",
  projectId: "finanzas-familiar-b41aa",
  storageBucket: "finanzas-familiar-b41aa.firebasestorage.app",
  messagingSenderId: "239691748871",
  appId: "1:239691748871:web:a67f2d95762dfef24b7ca2",

};
// ▲▲▲ FIN DE CONFIGURACIÓN ▲▲▲

const APP_PIN = "0402";  // ← Cambia tu PIN aquí

// ─── FIREBASE INIT ──────────────────────────────────────
let fbDB = null;
let DATA = {};

const CAT_ICONS = {
  "Ingresos":"💚","Arriendo":"🏠","Gastos Comunes":"🔧","Alimentación":"🛒",
  "Transporte":"🚗","Salud":"🏥","Educación":"📚","Mascotas":"🐾",
  "Entretenimiento":"🎬","Servicios":"📡","Familia":"👨‍👩‍👧","Deudas":"💸","Otro":"📦"
};
const CATEGORIES = Object.keys(CAT_ICONS);

// DEFAULT_DATA vacío — solo se usa si Firebase nunca ha tenido datos
// Una vez que Firebase tiene tus datos, JAMÁS se sobreescribe
const DEFAULT_DATA = {
  accounts:{}, transactions:{}, debts:{}, fixed_expenses:{},
  vacation:{ name:"", destination:"", date:"", budget:0, saved:0, items:{} }
};

function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDB = firebase.database();
    document.getElementById("fbStatus").textContent = "🔥 Firebase conectado";
    document.getElementById("fbStatus").style.color = "var(--green)";
    fbDB.ref("/familyfinance").on("value", snap => {
      const val = snap.val();
      if (_writing) return;
      if (val) {
        DATA = val;
      } else {
        DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
        fbDB.ref("/familyfinance").set(DATA);
      }
      renderCurrentTab();
    });
  } catch(e) {
    console.warn("Firebase no disponible:", e);
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    document.getElementById("fbStatus").textContent = "💾 Modo offline";
    document.getElementById("fbStatus").style.color = "var(--yellow)";
    renderCurrentTab();
  }
}

// ── Pausa el listener para evitar conflictos al escribir ──
let _writing = false;

function setDeep(obj, keys, val) {
  let cur = obj;
  for (let i=0; i<keys.length-1; i++) {
    cur[keys[i]] = cur[keys[i]] || {};
    cur = cur[keys[i]];
  }
  cur[keys[keys.length-1]] = val;
}

function fbSetObject(path, obj) {
  setDeep(DATA, path.split("/"), obj);
  if (fbDB) {
    _writing = true;
    fbDB.ref("/familyfinance/" + path).set(obj)
      .then(() => { setTimeout(() => { _writing = false; }, 500); })
      .catch(err => { _writing = false; showWriteError(err.message); });
  }
}

function fbSet(path, val) {
  setDeep(DATA, path.split("/"), val);
  if (fbDB) {
    _writing = true;
    fbDB.ref("/familyfinance/" + path).set(val)
      .then(() => { setTimeout(() => { _writing = false; }, 500); })
      .catch(err => { _writing = false; showWriteError(err.message); });
  }
}

function fbPush(path, val) {
  const key = "id_" + Date.now();
  fbSetObject(path + "/" + key, val);
  return key;
}

function fbDel(path) {
  const keys = path.split("/");
  let obj = DATA;
  for (let i=0; i<keys.length-1; i++) { if (!obj[keys[i]]) return; obj = obj[keys[i]]; }
  delete obj[keys[keys.length-1]];
  if (fbDB) {
    _writing = true;
    fbDB.ref("/familyfinance/" + path).remove()
      .then(() => { setTimeout(() => { _writing = false; }, 500); })
      .catch(err => { _writing = false; showWriteError(err.message); });
  }
}

function showWriteError(msg) {
  const t = document.getElementById("toast");
  t.textContent = "⚠️ Error guardando: " + msg;
  t.className = "err";
  t.style.display = "block";
  setTimeout(() => t.style.display="none", 5000);
}
// ─── HELPERS ──────────────────────────────────────────
function fmtCLP(n) {
  n = parseFloat(n)||0;
  const abs = Math.abs(Math.round(n)).toLocaleString("es-CL");
  return (n<0?"-":"") + "$" + abs;
}
function nowStr() {
  return new Date().toLocaleString("es-CL",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}).replace(/(\d+)\/(\d+)\/(\d+),\s*/,"$3-$2-$1 ");
}
function dateFmt(s) {
  if (!s) return "";
  try {
    const d = new Date(s.replace(" ","T"));
    return d.toLocaleString("es-CL",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
  } catch { return s.slice(0,16); }
}

// ─── PIN ─────────────────────────────────────────────
const pinBoxes = [0,1,2,3].map(i => document.getElementById("p"+i));
pinBoxes.forEach((box,i) => {
  box.addEventListener("input", () => {
    box.value = box.value.replace(/\D/g,"").slice(-1);
    if (box.value && i<3) pinBoxes[i+1].focus();
    const full = pinBoxes.map(b=>b.value).join("");
    if (full.length===4) checkPin(full);
  });
  box.addEventListener("keydown", e => {
    if (e.key==="Backspace" && !box.value && i>0) pinBoxes[i-1].focus();
  });
});
pinBoxes[0].focus();

function checkPin(pin) {
  if (pin === APP_PIN) {
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    initFirebase();
  } else {
    document.getElementById("pinError").textContent = "❌ PIN incorrecto";
    document.getElementById("pinInputs").classList.add("pin-error");
    pinBoxes.forEach(b => b.value="");
    setTimeout(()=>{
      document.getElementById("pinInputs").classList.remove("pin-error");
      document.getElementById("pinError").textContent="";
      pinBoxes[0].focus();
    }, 800);
  }
}

function logout() {
  document.getElementById("app").style.display = "none";
  document.getElementById("pin-screen").style.display = "flex";
  pinBoxes.forEach(b=>b.value="");
  document.getElementById("fbStatus").textContent="⏳ Conectando...";
  document.getElementById("fbStatus").style.color="var(--muted)";
  pinBoxes[0].focus();
}

// ─── TABS ────────────────────────────────────────────
let currentTab = "dashboard";
function showTab(tab) {
  document.querySelectorAll(".tab-pane").forEach(p=>p.style.display="none");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("pane-"+tab).style.display = "block";
  document.getElementById("nav-"+tab).classList.add("active");
  currentTab = tab;
  renderTab(tab);
}
function renderCurrentTab() { renderTab(currentTab); }
function renderTab(tab) {
  const renders = { dashboard:renderDashboard, movements:renderMovements, debts:renderDebts, fixed:renderFixed, vacation:renderVacation };
  if (renders[tab]) renders[tab]();
}

// ─── TOAST ─────────────────────────────────────────────
let toastTimer;
function toast(msg, err=false) {
  const t = document.getElementById("toast");
  t.textContent = (err?"⚠️ ":"✓ ") + msg;
  t.className = err?"err":"";
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display="none", 2800);
}

// ─── MODAL ─────────────────────────────────────────────
function openModal(html, onClose) {
  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "activeModal";
  overlay.innerHTML = `<div class="modal-sheet"><div class="drag-handle"></div>${html}</div>`;
  overlay.addEventListener("click", e => { if(e.target===overlay) closeModal(); });
  document.getElementById("modalContainer").appendChild(overlay);
}
function closeModal() {
  const m = document.getElementById("activeModal");
  if (m) m.remove();
}

function openAddTx(type) {
  const accs = DATA.accounts||{};
  const accOpts = Object.entries(accs).map(([id,a])=>`<option value="${id}">${a.icon||""} ${a.name}</option>`).join("");
  const catOpts = CATEGORIES.map(c=>`<option value="${c}">${CAT_ICONS[c]||""} ${c}</option>`).join("");
  let selectedType = type||"gasto";

  const html = `
    <div class="modal-title">💸 Nuevo Movimiento</div>
    <div class="type-toggle" id="typeToggle">
      <button class="type-btn ${selectedType==="gasto"?"active-gasto":""}" id="btnGasto" onclick="setTxType('gasto')">💸 Gasto</button>
      <button class="type-btn ${selectedType==="ingreso"?"active-ingreso":""}" id="btnIngreso" onclick="setTxType('ingreso')">💚 Ingreso</button>
    </div>
    <input type="hidden" id="txType" value="${selectedType}"/>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <input class="form-input" id="tx_desc" placeholder="Ej: Supermercado Líder"/>
    </div>
    <div class="form-group">
      <label class="form-label">Monto ($)</label>
      <input class="form-input" id="tx_amt" type="number" placeholder="0" inputmode="numeric"/>
    </div>
    <div class="form-group">
      <label class="form-label">Categoría</label>
      <select class="form-input" id="tx_cat">${catOpts}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Cuenta</label>
      <select class="form-input" id="tx_acc">${accOpts}</select>
    </div>
    <button class="btn btn-primary" onclick="saveTx()" style="margin-top:6px">💾 Guardar Movimiento</button>
  `;
  openModal(html);
}

function setTxType(t) {
  document.getElementById("txType").value = t;
  document.getElementById("btnGasto").className   = "type-btn" + (t==="gasto"?" active-gasto":"");
  document.getElementById("btnIngreso").className = "type-btn" + (t==="ingreso"?" active-ingreso":"");
}

function saveTx() {
  const desc  = document.getElementById("tx_desc").value.trim();
  const amt   = parseFloat(document.getElementById("tx_amt").value)||0;
  const cat   = document.getElementById("tx_cat").value;
  const acc   = document.getElementById("tx_acc").value;
  const ttype = document.getElementById("txType").value;
  if (!desc||!amt) { toast("Completa descripción y monto",true); return; }
  const finalAmt = ttype==="gasto" ? -Math.abs(amt) : Math.abs(amt);
  fbPush("transactions", {date:nowStr(), desc, amount:finalAmt, cat, account:acc, txtype:ttype});
  const oldBal = parseFloat((DATA.accounts[acc]||{}).balance||0);
  fbSet(`accounts/${acc}/balance`, oldBal+finalAmt);
  closeModal();
  toast(ttype==="gasto"?"Gasto registrado ✓":"Ingreso registrado ✓");
}

  const name = document.getElementById("efx_name").value.trim();
  if (!name) { toast("Ingresa un nombre",true); return; }
  fbSet(`fixed_expenses/${id}/name`,   name);
  fbSet(`fixed_expenses/${id}/amount`, parseFloat(document.getElementById("efx_amt").value)||0);
  fbSet(`fixed_expenses/${id}/day`,    parseInt(document.getElementById("efx_day").value)||1);
  fbSet(`fixed_expenses/${id}/cat`,    document.getElementById("efx_cat").value);
  fbSet(`fixed_expenses/${id}/icon`,   document.getElementById("efx_icon").value);
  closeModal(); toast("Gasto fijo actualizado ✓");
}

// ═══════════════════════════════════════════════════════
// EDIT TRANSACTION
// ═══════════════════════════════════════════════════════
function openEditTx(id) {
  const tx = (DATA.transactions||{})[id];
  if (!tx) return;
  const accs = DATA.accounts||{};
  const accOpts = Object.entries(accs).map(([aid,a])=>
    `<option value="${aid}" ${aid===tx.account?"selected":""}>${a.icon||""} ${a.name}</option>`
  ).join("");
  const catOpts = CATEGORIES.map(c=>`<option value="${c}" ${c===tx.cat?"selected":""}>${CAT_ICONS[c]||""} ${c}</option>`).join("");
  const amt = Math.abs(parseFloat(tx.amount||0));
  openModal(`
    <div class="modal-title">✏️ Editar Movimiento</div>
    <div class="form-group"><label class="form-label">Descripción</label>
      <input class="form-input" id="etx_desc" value="${tx.desc||""}"/></div>
    <div class="form-group"><label class="form-label">Monto ($)</label>
      <input class="form-input" id="etx_amt" type="number" value="${amt}" inputmode="numeric"/></div>
    <div class="form-group"><label class="form-label">Categoría</label>
      <select class="form-input" id="etx_cat">${catOpts}</select></div>
    <div class="form-group"><label class="form-label">Cuenta</label>
      <select class="form-input" id="etx_acc">${accOpts}</select></div>
    <button class="btn btn-primary" onclick="saveEditTx('${id}')" style="margin-bottom:8px">💾 Guardar Cambios</button>
    <button class="btn btn-red" onclick="if(confirm('¿Eliminar este movimiento?')){fbDel('transactions/${id}');closeModal();toast('Movimiento eliminado');}">🗑 Eliminar</button>
  `);
}
function saveEditTx(id) {
  const tx   = (DATA.transactions||{})[id];
  const desc = document.getElementById("etx_desc").value.trim();
  const amt  = parseFloat(document.getElementById("etx_amt").value)||0;
  if (!desc||!amt) { toast("Completa todos los campos",true); return; }
  const finalAmt = tx.txtype==="gasto" ? -Math.abs(amt) : Math.abs(amt);
  fbSet(`transactions/${id}/desc`,    desc);
  fbSet(`transactions/${id}/amount`,  finalAmt);
  fbSet(`transactions/${id}/cat`,     document.getElementById("etx_cat").value);
  fbSet(`transactions/${id}/account`, document.getElementById("etx_acc").value);
  closeModal(); toast("Movimiento actualizado ✓");
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

const months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const now=new Date();
document.getElementById("headerSub").textContent = `${months[now.getMonth()]} ${now.getFullYear()} · Joli & Coffee 🐾`;
